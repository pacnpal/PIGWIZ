<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160"
     shape-rendering="crispEdges">
  <!-- Dark background, CRT-ish -->
  <rect width="480" height="160" fill="#141414"/>

  <!-- Thin top and bottom rules -->
  <rect x="0" y="0" width="480" height="2" fill="#C8870A"/>
  <rect x="0" y="158" width="480" height="2" fill="#C8870A"/>

  <!-- PIGWIZ wordmark, amber phosphor -->
  <text x="240" y="92" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="62" font-weight="700"
        fill="#FFB000" letter-spacing="8">PIGWIZ</text>

  <!-- Subtitle in dimmer amber -->
  <text x="240" y="124" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" font-weight="400"
        fill="#9A6F00" letter-spacing="3">PICOGUS  DOS  SETUP  TOOLS</text>
</svg>
