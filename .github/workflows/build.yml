# Build PGINST.EXE / PGSETUP.EXE / PGBUNDLE.EXE and assemble release
# artifacts.
#
# Triggers:
#   * workflow_dispatch  - manual run. Optional `version` input is baked
#                          into the EXE title bars (defaults to "dev").
#   * release published  - on a full GitHub release. The release tag is
#                          used as the version and the bundle is attached
#                          to that release.
#
# Pipeline:
#   1. build:    compile with Open Watcom v2 (pangbox/openwatcom-action
#                container).  Produces PGINST.EXE, PGSETUP.EXE and the
#                PGBUNDLE stub, uploaded as one artifact.
#   2. bundle:   on ubuntu-latest, fetch upstream PicoGUS release plus
#                FreeDOS helpers (CTMOUSE / SHSUCDX / UIDE / UDVD2), pack
#                the zip distro AND append the same payload to the
#                PGBUNDLE stub to produce the self-extracting EXE.
#   3. release:  on release events only, attach all three formats - the
#                self-extracting EXE, the zip, and the raw EXEs - to the
#                triggering release.
name: build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string baked into the EXEs (e.g. v1.2.3)"
        required: false
        default: "dev"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pangbox/openwatcom-action:latest
      options: --entrypoint /bin/sh

    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            v="${{ github.event.release.tag_name }}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          v="${v:-dev}"
          echo "Resolved version: ${v}"
          echo "value=${v}" >> "$GITHUB_OUTPUT"

      - name: Build with Open Watcom
        env:
          WATCOM: /opt/watcom
          PGWIZ_EXTRA_CFLAGS: -DPGWIZ_VERSION="\"${{ steps.version.outputs.value }}\""
        run: |
          export PATH="$WATCOM/binl64:$WATCOM/binl:$PATH"
          export INCLUDE="$WATCOM/h"
          "$WATCOM/binl64/wmake" -f Makefile

      - name: Verify MZ headers
        run: |
          file pginst.exe pgsetup.exe pgbundle.exe
          head -c 2 pginst.exe   | grep -q "^MZ"
          head -c 2 pgsetup.exe  | grep -q "^MZ"
          head -c 2 pgbundle.exe | grep -q "^MZ"

      - name: Stage outputs
        run: |
          mkdir -p outputs
          cp pginst.exe   outputs/PGINST.EXE
          cp pgsetup.exe  outputs/PGSETUP.EXE
          cp pgbundle.exe outputs/PGBUNDLE-STUB.EXE
          ls -lh outputs/

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pigwiz-exes-${{ steps.version.outputs.value }}
          path: outputs/*.EXE
          if-no-files-found: error

  bundle:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (needed for bundle.sh + pack-bundle.py)
        uses: actions/checkout@v4

      - name: Install bundling tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y zip unzip curl wget python3

      - name: Pull built EXEs from the build job
        uses: actions/download-artifact@v4
        with:
          name: pigwiz-exes-${{ needs.build.outputs.version }}
          path: outputs

      - name: Assemble zip distro + self-extracting EXE
        env:
          PIGWIZ_VERSION: ${{ needs.build.outputs.version }}
          # Optional: set the GUS_PATCHES_URL secret to a zip of the
          # Gravis UltraSound v4.11 driver kit, and bundle.sh will pack
          # it (plus a DOS UNZIP.EXE) into the release so PGINST.EXE can
          # auto-deploy patches to C:\ULTRASND\. Unset = same behaviour
          # as before: installer prompts the user to fetch them.
          GUS_PATCHES_URL: ${{ secrets.GUS_PATCHES_URL }}
        run: |
          ./bundle.sh
          echo
          echo "Final outputs/:"
          ls -lh outputs/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: pigwiz-release-${{ needs.build.outputs.version }}
          # Everything destined for the release page, minus the stub
          # (which is only useful inside the build).
          path: |
            outputs/PIGWIZ-*.zip
            outputs/PGBUNDLE-*.EXE
            outputs/PGINST.EXE
            outputs/PGSETUP.EXE
          if-no-files-found: error

  attach-to-release:
    needs: [build, bundle]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: pigwiz-release-${{ needs.build.outputs.version }}
          path: outputs

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # Strip the rolling -latest copies so only versioned filenames
          # land on the release page.
          files: |
            outputs/PIGWIZ-*-pg-*.zip
            outputs/PGBUNDLE-*-pg-*.EXE
            outputs/PGINST.EXE
            outputs/PGSETUP.EXE
          fail_on_unmatched_files: true
